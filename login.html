<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="topHeader">
    <p>Summer Sales For All Swim Suits and Free Express Delivery-OFF 50%! <span>ShopNow</span></p>
   
    

<select name="lang" id="langs">
    <option value="none">English</option>
    <option value="latin">latin</option>
    <option value="hebrew">hebrew</option>
    <option value="greek">greek</option>
</select>

   
   
</div>

<header class="header container">
    <h1 class="logo">Exclusive</h1>

    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Contact</a>
        <a href="#">About</a>
        <a href="#" class="active">Sign up</a>
    </nav>

    <div class="search">
        <input type="text" placeholder="What are you looking for?">
    </div>
</header>
<hr>

<main class="container main">

    <!-- left float -->
     <div class="left">
        <img src="./images/phoneCart.jpeg" alt="left-side img">
     </div>

     <!-- right float -->
      <div class="right">
        <h2>Create an account</h2>
        <p class="subtitle">
            Enter your details below
        </p>

        <form class="form">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Email or Phone Number">
            <input type="text" placeholder="Password">

            <button class="btn CreateAccount">Create Account</button>
            <button class="btn signUp">Sign up with Google</button>

            <p class="login">
                Already have account? <a href="#">Log in</a>
            </p>
        </form>
      </div>
</main>

</body>
</html>
